<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Logo Ennéagramme</title>
  <desc id="desc">Losange émeraude avec le reflet stylisé d'un sept.</desc>
  <defs>
    <linearGradient id="emerald" x1="34" y1="36" x2="220" y2="226" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22b88f"/>
      <stop offset="0.48" stop-color="#00795d"/>
      <stop offset="1" stop-color="#014234"/>
    </linearGradient>
    <linearGradient id="shine" x1="72" y1="66" x2="168" y2="170" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.92"/>
      <stop offset="0.55" stop-color="#e9fff8" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="12" flood-color="#12352c" flood-opacity="0.24"/>
    </filter>
  </defs>
  <rect x="48" y="48" width="160" height="160" rx="18" transform="rotate(45 128 128)" fill="url(#emerald)" filter="url(#softShadow)"/>
  <path d="M83 92h94l-43 78" fill="none" stroke="#f6e8b7" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M88 88h84l-38 70" fill="none" stroke="url(#shine)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M74 73 128 35l54 38" fill="none" stroke="#bff4df" stroke-width="3" stroke-opacity="0.32" stroke-linecap="round"/>
</svg>
